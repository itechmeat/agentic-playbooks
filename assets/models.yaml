# Scored recommendations. score is 1-10; higher means better fit for the purpose.
purposes:
  - id: coding
    description: General software implementation from a clear spec.
    scores:
      - { model: claude-opus-4-8, score: 10 }
      - { model: gpt-5.6-sol, score: 9 }
      - { model: claude-sonnet-5, score: 8 }
      - { model: deepseek-v4-pro, score: 7 }
  - id: frontend
    description: UI and frontend work, layout and component code.
    scores:
      - { model: claude-opus-4-8, score: 9 }
      - { model: gpt-5.6-terra, score: 8 }
      - { model: gemini-3.1-pro-preview, score: 7 }
  - id: review
    description: Code review and adversarial correctness checking.
    scores:
      - { model: claude-opus-4-8, score: 10 }
      - { model: gpt-5.6-sol, score: 9 }
      - { model: o4-mini, score: 7 }
  - id: planning
    description: Decomposing work into an implementation plan.
    scores:
      - { model: claude-opus-4-8, score: 9 }
      - { model: gemini-3.1-pro-preview, score: 8 }
      - { model: gpt-5.6-sol, score: 8 }
  - id: brainstorming
    description: Open-ended idea generation and design exploration.
    scores:
      - { model: claude-opus-4-8, score: 9 }
      - { model: gpt-5.6-terra, score: 8 }
      - { model: grok-4, score: 7 }
  - id: writing
    description: Prose, documentation and copy.
    scores:
      - { model: claude-opus-4-8, score: 9 }
      - { model: claude-fable-5, score: 9 }
      - { model: claude-sonnet-5, score: 8 }
  - id: translation
    description: Natural-language translation between locales.
    scores:
      - { model: gemini-3.1-pro-preview, score: 9 }
      - { model: gpt-5.6-terra, score: 8 }
      - { model: claude-sonnet-5, score: 8 }
  - id: cheap-glue
    description: High-volume mechanical glue where cost dominates.
    scores:
      - { model: gemini-2.5-flash-lite, score: 9 }
      - { model: gpt-5.4-nano, score: 8 }
      - { model: gemini-3.1-flash-lite, score: 8 }
  - id: vision-tasks
    description: Tasks that require reading images or screenshots.
    scores:
      - { model: gemini-3.1-pro-preview, score: 9 }
      - { model: claude-opus-4-8, score: 9 }
      - { model: gpt-5.6-sol, score: 8 }
  - id: research
    description: Long-context synthesis across many documents.
    scores:
      - { model: gemini-3.1-pro-preview, score: 10 }
