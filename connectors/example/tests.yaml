cases:
  - function: ping
    account: {}
    args: {}
    expect:
      status: 200
      body: { ok: true }
  - function: get_item
    account: { api_base: https://api.example.com }
    args: { id: "42" }
    expect:
      method: GET
      url: https://api.example.com/items/42
  - function: create_item
    account: { api_base: https://api.example.com }
    args: { title: Hello }
    expect:
      method: POST
      url: https://api.example.com/items
      body_contains: { title: Hello }
