name: example
version: 0.1.0
healthcheck: ping
auth:
  kind: header
  header: Authorization
  value_template: "Bearer {{secret.token}}"
account_fields:
  - name: api_base
    required: true
  - name: token
    required: true
    secret: true
functions:
  - name: ping
    description: Reachability check with no network call
    read_only: true
    mock:
      status: 200
      body: { ok: true }
  - name: get_item
    description: Fetch one item by id
    read_only: true
    method: GET
    url: "{{account.api_base}}/items/{{args.id}}"
    args_schema:
      type: object
      properties:
        id:
          type: string
      required: [id]
  - name: create_item
    description: Create an item
    method: POST
    url: "{{account.api_base}}/items"
    body: "{{args}}"
    args_schema:
      type: object
      properties:
        title:
          type: string
      required: [title]
