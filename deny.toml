# cargo-deny configuration.
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[licenses]
# Permissive licenses only. Each crate's license must match this allowlist,
# or appear in `exceptions` below with an explicit human-reviewed reason.
allow = [
    "MIT",
    # MIT-0 is MIT without the attribution clause. Pulled in by borrow-or-share
    # (ureq's URI parsing dependency).
    "MIT-0",
    # 0BSD (BSD Zero Clause) is public-domain-equivalent, the same class as
    # MIT-0/CC0/Unlicense already allowed here. Pulled in by quoted_printable
    # (lettre's MIME encoding dependency for the smtp connector kind).
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "BSL-1.0",
    "CC0-1.0",
    # CDLA-Permissive-2.0 is the permissive data license of the Mozilla CA root
    # store bundle. Pulled in by webpki-roots (via ureq/rustls).
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
# Copyleft (GPL/LGPL/AGPL) licenses are denied by default. Crates that fall
# under copyleft but are not actually compiled into shipped binaries (because
# they are target-specific) are listed here after manual review.
exceptions = [
    # r-efi is a target-specific dependency of getrandom/wit-bindgen for UEFI
    # targets only. It lives in Cargo.lock but is NOT compiled into the
    # darwin/linux binaries we ship, so LGPL-2.1-or-later static-link concerns
    # do not apply to the distributed artifact.
    { allow = ["LGPL-2.1-or-later"], name = "r-efi" },
]

[advisories]
# Default policy: deny known unsound/vulnerable crates; warn on unmaintained.
# yanked crates are always denied.
yanked = "deny"

[bans]
# No multiple versions of the same crate by default. Lint, do not block.
multiple-versions = "warn"
wildcards = "warn"
