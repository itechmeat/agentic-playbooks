- id: review
  title: null
  expected_duration: 30m
  inputs: null
  outputs: null
  cache: null
  type: agent_task
  prompt: |
    REPORTING CONTRACT (overrides the generic report instruction apb
    appends AFTER this prompt): end your reply with the fenced yaml
