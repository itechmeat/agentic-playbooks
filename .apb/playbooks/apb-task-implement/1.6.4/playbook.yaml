    PHASE: Independent review of the full branch diff. You wrote none of
    this code; judge it adversarially.

    Scope: {{nodes.lock_scope.output}}
    Implementation report: {{nodes.implement.output}}

    Review `git diff origin/main...HEAD`: SOLID, KISS, DRY, misleading
    fallbacks, hardcoded values, project conventions from CLAUDE.md
    (crate dependency direction, atomic state writes, serde defaults on
    new event fields, secret hygiene, naming rules), and honest test
    coverage. Verify the implementer's claimed gate results by
    re-running the cheap ones (fmt, clippy) and spot-checking the rest;
    check the changed symbols' blast radius; verify the acceptance
    criteria from the scope are actually covered by tests, and check
    every deliverable the scope's task description names actually
    exists in the diff. The branch was implemented as parallel subtasks
    merged together; pay extra attention to the seams between subtasks
    (shared types, call sites crossing subtask boundaries, duplicated
    helpers).

    Blockers: fail the node with findings ordered by severity, actionable
    verbatim. No blockers: succeed with a short review summary and any
    non-blocking notes.
  profile:
    name: developer
    scope: auto
  max_retries: 1
