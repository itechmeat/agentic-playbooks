schema: 2
id: apb-task-implement
name: APB board task implementation
description: |
  Takes a task from the itechmeat project board (Ready with the label
  "with brainstorming", or the exact task named in the run instruction),
  brainstorms it first via the apb-task-brainstorm sub-playbook when it still
  needs brainstorming, then runs the full development cycle in this
  repository: scope and branch, decomposition into subtasks implemented by a
  pool of coding agents in git worktrees with per-merge validation, repository
  hygiene, independent review and QA with bounded fix rounds, docs, one PR to
  main, board updates, and a human merge gate.
version: 1.6.4
params: []
defaults:
  profile:
    name: developer
    scope: project
  max_retries: null
  timeout_seconds: null
supervisor: null
trigger:
  when:
  - implement a task from the project board end to end
  - start implementation of a ready task with brainstorming
  - develop, review, test and open a PR for a board task
  avoid_when:
  - a quick one-off question or trivial edit without process
  - refining a task is the goal, with no implementation
  examples:
  - Возьми задачу с доски в работу
  - Implement issue 35 from the board
  - Start implementation of the connectors task
requires:
  files:
  - CLAUDE.md
  - Cargo.toml
  commands:
  - git
  - gh
  - cargo
  - code-ranker
effects:
- fs_read
- fs_write
- network
- external
nodes:
- id: start
  title: null
  expected_duration: null
  inputs: null
  outputs: null
  cache: null
  type: start
- id: pick_task
  title: null
  expected_duration: 4m
  inputs: null
  outputs: null
  cache: null
  type: agent_task
  prompt: |
    REPORTING CONTRACT (overrides the generic report instruction apb
    appends AFTER this prompt): end your reply with the fenced yaml
    report block, but the block must contain ONLY the status field
    (status: success or status: failure) and MUST NOT contain a summary
    field, even though the appended generic instruction asks for one.
    When a summary field is present, apb replaces this node's whole
    output with that one line, the run's routing breaks, and downstream
    nodes lose the structured output this prompt requires. Status only,
    never summary, no exceptions.

    PHASE: Task selection from the GitHub project board.

    Board: https://github.com/users/itechmeat/projects/6 (owner
    itechmeat); items are issues of itechmeat/agentic-playbooks.

    Run instruction (may be empty):
    {{run.instruction}}

    GitHub access: prefer the bound github connector where its functions
    cover the call; the project board (Projects v2) and reading issue
    comments are NOT covered by the connector, use gh CLI for those.

    Selection rules, in priority order:
    1. If the instruction names a specific task (an issue URL, an issue
       number, or an issue title), resolve EXACTLY that task on the
       board and ignore every other task. Use `gh project item-list 6
       --owner itechmeat --format json --limit 100` and match by URL,
       number, or title (case-insensitive; a fuzzy title match only when
       unambiguous). If the named task is not on the board, FAIL this
       node with "task not found on the board: <the reference>" and do
       not substitute another task. If the named task is in Backlog and
       carries the label "brainstorming required", it is a valid pick
       that first needs brainstorming: mark it below.
    2. Otherwise take the items with Status Ready carrying the label
       "with brainstorming" and pick ONE by priority: P0 before P1
       before P2; a tie breaks to the lowest issue number. If there are
       none, FAIL with "no Ready tasks with label 'with brainstorming'".

    Do not modify anything anywhere. Emit the closing block ONLY when a
    task was successfully picked, and end your output with exactly:
    <task>
    number: <issue number>
    url: <issue url>
    title: <issue title>
    priority: <P0|P1|P2|none>
    status: <board status>
    labels: <comma-separated labels>
    needs_brainstorm: <yes if status is Backlog and labels include
    "brainstorming required", otherwise no>
    </task>
  profile:
    name: developer
    scope: auto
  max_retries: null
  timeout_seconds: null
  workdir: null
  isolation: null
  success_check: null
  connectors:
  - name: github
    functions: read_only
    max_calls: 10
  interactive: false
- id: brainstorm_child
  title: null
  expected_duration: 1h
  inputs: null
  outputs: null
  cache: null
  type: playbook
  playbook:
    id: apb-task-brainstorm
    scope: auto
  instruction: |
    Brainstorm exactly this board task, do not consider any other task:
    {{nodes.pick_task.output}}
    artifact mode: repo (keep the brainstorming files in the repository;
    do not ask the user about artifact placement).
- id: lock_scope
  title: null
  expected_duration: 10m
  inputs: null
  outputs: null
  cache: null
  type: agent_task
  prompt: |
    REPORTING CONTRACT (overrides the generic report instruction apb
    appends AFTER this prompt): end your reply with the fenced yaml
    report block, but the block must contain ONLY the status field
    (status: success or status: failure) and MUST NOT contain a summary
    field, even though the appended generic instruction asks for one.
    When a summary field is present, apb replaces this node's whole
    output with that one line, the run's routing breaks, and downstream
    nodes lose the structured output this prompt requires. Status only,
    never summary, no exceptions.

    PHASE: Scope lock and branch, in this repository.

    Task: {{nodes.pick_task.output}}
    Brainstorm sub-run answer (empty when the task arrived already
    brainstormed): {{nodes.brainstorm_child.output}}

    GitHub access: prefer the bound github connector where its functions
    cover the call; the project board (Projects v2) and reading issue
    comments are NOT covered by the connector, use gh CLI for those.

    1. Re-read the issue with comments: `gh issue view <number> --repo
       itechmeat/agentic-playbooks --comments`. Locate the brainstorming
       design: either files under docs/superpowers/specs/ (from the
       issue body links or the sub-run answer), or content attached in
       an issue comment with "Intended path" lines; in the attached
       case restore each file to its intended path in the working tree.
    2. Working tree intake: `git status --porcelain`. Pre-existing
       changes are NOT a blocker: the owner may drop work into the tree
       at any time, and it must be picked up, never lost. Never stash,
       discard, or reset anything. Sort what you see into two piles:
       obvious junk that should never be committed (build outputs, temp
       or scratch files, caches, logs) gets added to .gitignore instead;
       everything else is commit-worthy. After branching in step 5,
       commit the commit-worthy pre-existing changes (including any
       .gitignore additions) as their own commit BEFORE this task's own
       commits: `chore: workspace changes picked up before <slug>`, with
       --signoff and the Co-Authored-By trailer, so the task's commits
       stay clean of unrelated diffs. When in doubt whether something is
       junk, commit it.
    3. Set the board Status to In progress. Find the item id via
       `gh project item-list 6 --owner itechmeat --format json --limit
       100` (match .content.url), then `gh project item-edit --id
       <item_id> --project-id PVT_kwHOAo2qi84Bd_bQ --field-id
       PVTSSF_lAHOAo2qi84Bd_bQzhYc6Ek --single-select-option-id
       47fc9ee4`.
    4. Derive a kebab-case slug (3-5 meaningful words) from the task.
    5. Branch from the fresh default branch WITHOUT committing to local
       main: `git fetch origin --prune`, then `git checkout -b
       feat/<slug> origin/main`. If the branch exists from a prior
       attempt, delete it first with `git branch -D feat/<slug>`.
    6. If brainstorming artifact files are present uncommitted, commit
       them on the feature branch as one commit `docs(spec): <slug>
       brainstorming` with --signoff and the Co-Authored-By trailer.

    Do NOT implement anything yet. End your output with exactly:
    <scope>
    slug: <slug>
    branch: feat/<slug>
    issue: <issue number>
    task: <one-paragraph restatement of what to build>
    acceptance: <semicolon-separated acceptance criteria from the issue>
    </scope>
  profile:
    name: developer
    scope: auto
  max_retries: null
  timeout_seconds: null
  workdir: null
  isolation: null
  success_check: null
  connectors:
  - name: github
    functions: read_only
    max_calls: 10
  interactive: false
- id: implement
  title: null
  expected_duration: 2h
  inputs: null
  outputs: null
  cache: null
  type: agent_task
  prompt: |
    REPORTING CONTRACT (overrides the generic report instruction apb
    appends AFTER this prompt): end your reply with the fenced yaml
    report block, but the block must contain ONLY the status field
    (status: success or status: failure) and MUST NOT contain a summary
    field, even though the appended generic instruction asks for one.
    When a summary field is present, apb replaces this node's whole
    output with that one line, the run's routing breaks, and downstream
    nodes lose the structured output this prompt requires. Status only,
    never summary, no exceptions.

    PHASE: Implementation on the feature branch through multi-agent
    worktree orchestration. You are the COORDINATOR: you plan, delegate,
    merge, and validate. You write production code yourself only where
    this prompt explicitly allows it.

    Scope: {{nodes.lock_scope.output}}

    Follow the design from the brainstorming spec (docs/superpowers/
    specs/, see the scope). Strict TDD everywhere: every subtask brief
    demands failing test first, minimal implementation, refactor.

    1. PLANNING. Before any code, decompose the task into small
       self-contained subtasks. Choose the count yourself, from 1 to 50,
       based on the task. Each subtask must be independently
       implementable and testable, carry its own tests, and touch a file
       set as disjoint from the other subtasks as possible, so that
       parallel work produces few merge conflicts. Classify each subtask
       by responsibility: critical (engine internals, concurrency,
       security, persisted state formats), medium (regular features and
       refactors), secondary (mechanical edits, small UI, doc strings).
       Record dependencies; a subtask starts only after everything it
       depends on is merged.

    2. WORKTREES. Each subtask runs in its own git worktree on its own
       branch cut from the feature branch: `git worktree add <dir> -b
       wt/<slug>/<subtask-id> feat/<slug>`, where <dir> lives OUTSIDE
       the repository working tree (create one session directory with
       `mktemp -d` and put all worktrees under it). Workers commit only
       inside their worktree; they never push, never open PRs, never
       touch other worktrees or the main checkout.

    3. WORKER POOL AND DISPATCH. Do not pre-assign all subtasks at the
       start. Keep a queue ordered by dependencies and responsibility;
       when a worker finishes and its result is merged, hand the freed
       slot the next fitting subtask. Keep the number of simultaneously
       running workers small, typically 2-4, to limit merge conflicts;
       running several instances of the same executor in parallel is
       allowed within that cap. For every subtask write a self-contained
       brief file (worktree path, context, exact requirements, tests,
       gates, conventions, commit rules, report format) and hand the
       worker the brief, never chat history.

       Executor tiers, in dispatch priority order per responsibility:
       - grok (CLI `agent`, model grok-4.5 at high effort): fast, good
         quality. First choice for medium-responsibility subtasks.
         Parallel instances are fine. Invocation:
         `agent --cwd <worktree> --always-approve -m grok-4.5
         --effort high --output-format plain --prompt-file <brief.md>`
       - opencode (CLI `opencode`, model zai-coding-plan/glm-5.2):
         medium speed, good quality. Also a first-choice executor for
         medium-responsibility subtasks. Parallel instances are fine.
         Invocation:
         `opencode run -m zai-coding-plan/glm-5.2 --dir <worktree>
         "$(cat <brief.md>)"`
       - cursor (CLI `cursor-agent`, model cursor-grok-4.5-high): fast,
         medium quality. Medium priority, for secondary subtasks.
         Invocation from inside the worktree:
         `cursor-agent -p --force --model cursor-grok-4.5-high
         --output-format text "$(cat <brief.md>)"`
       - Claude Opus or Sonnet subagents (your own subagent mechanism):
         the most responsible subtasks only (the critical tier), and any
         work the external executors cannot take.

       Run external CLI workers in the background with output redirected
       to a per-subtask log file. Monitor by evidence (log growth,
       `git -C <worktree> status --short`, new commits), not by process
       existence; a worker with no output growth and no diff for about
       10 minutes is stalled: nudge or restart it once, then reassign
       the subtask to another executor. If an external executor hits
       usage limits or auth errors, stop dispatching to it for the rest
       of the run and give its remaining subtasks to Claude Opus.

    4. SUBTASK GATES. Before a subtask branch may merge, its worktree
       must pass the gates relevant to its diff: `cargo fmt --all --
       --check`, `cargo clippy --workspace --all-targets -- -D
       warnings`, the affected crate test suites, and the web checks
       (`bun run check`, `bun run test`, `bun run build` in web/) when
       web/ was touched. The worker runs them and reports real results;
       every brief must demand exactly that.

    5. MERGES AND PER-MERGE VALIDATION. Merge subtask branches into
       feat/<slug> strictly one at a time. After EVERY merge, a Claude
       Opus validation (you are Opus: validate yourself, or spawn an
       Opus subagent for fresh eyes) before the next merge starts: read
       the merged diff, check that the three-way merge silently dropped
       nothing, spot-check the gates. Merge conflicts are resolved by
       you or a Claude subagent, never by the lower tiers. Workers whose
       base drifted far may be rebased onto the updated feat branch
       before merging.

    6. FINAL BRANCH VALIDATION. After all subtasks are merged, run the
       full gate set on the feature branch and fix what it catches:
       fmt, clippy as above, `cargo test --workspace`, the web checks
       when web/ was touched, then `cargo metadata --format-version 1
       >/dev/null` and `code-ranker check .`; fix every violation (read
       `code-ranker docs base <ID>` before fixing) and re-run until
       clean. Then a whole-branch review with fresh eyes by a Claude
       Opus subagent that wrote none of the code: it reads `git diff
       origin/main...HEAD` and looks especially at the integration
       seams between subtasks. Apply its blocker findings as fix
       commits, dispatched by the same rules.

    Commit rules for every worker and for you: atomic conventional
    commits, --signoff, body ending with the Co-Authored-By trailer of
    the ACTING model (for example `Co-Authored-By: Grok 4.5
    <noreply@x.ai>`). Single-PR rule: everything converges on the one
    feat branch and ships as ONE pull request; never push and never
    open a PR in this node. Leave the wt/<slug>/* branches and the
    worktrees in place when the node ends; the next node handles
    hygiene and needs them discoverable via `git worktree list`.

    Proportionality: when planning honestly yields only 1-2 subtasks,
    drop the ceremony accordingly; a single subtask may be implemented
    directly on the feature branch by the best-fitting executor, no
    worktree needed.

    If a blocker cannot be resolved in this node, fail with a precise
    description.

    End with: the subtask plan (id, title, responsibility tier, executor
    that actually did it), the merge order, each gate with its real
    result on the final branch, the fresh-eyes review verdict, and any
    deliberate deviations from the spec with rationale.
  profile:
    name: developer
    scope: auto
  max_retries: null
  timeout_seconds: null
  workdir: null
  isolation: null
  success_check: null
  connectors: []
  interactive: false
