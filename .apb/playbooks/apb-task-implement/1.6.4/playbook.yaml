    PHASE: Repository hygiene after the orchestrated implementation.
    You clean up orchestration leftovers; the feature branch and its
    commits are untouchable.

    Scope: {{nodes.lock_scope.output}}
    Implementation report: {{nodes.implement.output}}

    1. `git worktree list`: remove every worktree the implementation
       created (`git worktree remove <dir>`, add --force only for a
       worktree with leftover junk), then `git worktree prune`.
    2. Delete every temporary subtask branch: all local branches
       matching wt/<slug>/* via `git branch -D`. They must never have
       been pushed; if one somehow was, delete it on origin too.
    3. If brief or log files from the orchestration ended up inside the
       repository working tree and are untracked, delete them; tracked
       files stay.
    4. Verify: the feature branch is checked out with its commits intact
       (`git log origin/main..HEAD --oneline` is non-empty), `git
       status --porcelain` shows no orchestration debris, `git worktree
       list` shows only the main working tree, and `git branch --list
       'wt/*'` is empty.

    A cleanup hiccup you can work around must not fail this node; fail
    only when the feature branch or its commits are damaged, or a
    temporary branch or worktree cannot be removed at all.

    End with: worktrees removed, branches deleted, files cleaned, and
    the verification result.
  profile:
    name: janitor
    scope: project
  max_retries: null
  timeout_seconds: null
  workdir: null
  isolation: null
  success_check: null
  connectors: []
