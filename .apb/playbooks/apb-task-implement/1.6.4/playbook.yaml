    PHASE: Completion of the orchestrated implementation. You are the
    COORDINATOR finishing a wave whose earlier subtasks are already
    merged; a previous coordinator exited prematurely, so you finish
    the remainder.

    Scope: {{nodes.lock_scope.output}}

    EXECUTION MODEL, read first: you run as one non-interactive agent
    process, and your reply ends your existence. NEVER end your reply
    in order to wait for workers, monitors, timers, or notifications:
    nothing will ever invoke you again, the engine will wrongly record
    your interim text as this node's final successful result, and the
    next node's cleanup will destroy your in-flight workers. To wait,
    stay alive by running blocking commands in a loop inside your
    session (for example `sleep 60` followed by evidence checks: log
    growth, `git -C <worktree> log`, process liveness), for as long as
    it takes. Produce your reply ONLY when the remainder is merged into
    the feature branch and the final gate set has run; that reply is
    the node's one and only report.

    CURRENT BRANCH STATE, verify first with `git log origin/main..HEAD
    --oneline` and `ls connectors/`: the engine extensions body_form
    and error_when plus the gitlab, youtrack, discord, and zulip
    connectors and their tests are already merged and verified green;
    docs/CONNECTORS.md already covers those four services. Do not redo
    or rewrite the landed work.

    THE REMAINDER (from the design doc docs/superpowers/specs/
    2026-07-22-official-connectors-wave-3-design.md and the prior
    review round):
    - slack connector: connectors/slack/{connector.yaml,PUBLIC.md,
      tests.yaml} per design section 5.1 (Bearer bot token; account
      fields api_base + token secret; connector-level error_when with
      path ok, equals false, message_path error; functions auth_test
      as read_only POST healthcheck, list_channels, get_messages,
      get_thread, send_message, reply_in_thread; cursor pagination
      like asana; response_pick on every read_only function; PUBLIC.md
      covers bot scopes and the channel-invite requirement), plus a
      render test crates/apb-engine/tests/connector_slack.rs modeled
      on connector_zulip.rs that also proves the error_when path (a
      200 with ok false surfaces as a service error carrying the
      message) - slack is the sole consumer of error_when, which
      currently ships unused.
    - demo playbook examples/playbooks/release-heartbeat.yaml per
      design section 6 (gitlab list_pipelines and get_pipeline on the
      default branch, agent summarizes, posts via a messaging
      connector, files a youtrack issue via create_issue on failure;
      connector grants name exactly the used functions and
      deliberately omit trigger_pipeline), covered in
      crates/apb-cli/tests/suite/demo_playbooks_test.rs.
    - docs/CONNECTORS.md slack section matching the existing sections.
    - env-gated live smoke tests for all five services in
      crates/apb-cli/tests/suite/live_smoke_test.rs per the wave 1-2
      pattern (ignore-marked, APB_LIVE_TEST_<SERVICE>=1, healthcheck
      plus one read-only call).
    - release notes: bump the workspace version to the next free minor
      (update inter-crate pins), add docs/release-notes/<tag>.md
      covering the five connectors and both engine extensions (one
      paragraph per line, no hard wraps), update CHANGELOG.md.

    DISPATCH: use worktrees and the worker pool exactly as the wave's
    established pattern: subtask branches `git worktree add <dir> -b
    wt/<slug>/<subtask-id> feat/<slug>` with <dir> under one `mktemp
    -d` session dir; self-contained brief files; executors in priority
    order grok (`agent --cwd <worktree> --always-approve -m grok-4.5
    --effort high --output-format plain --prompt-file <brief.md>`),
    opencode (`opencode run -m zai-coding-plan/glm-5.2 --dir
    <worktree> "$(cat <brief.md>)"`), cursor from inside the worktree
    (`cursor-agent -p --force --model cursor-grok-4.5-high
    --output-format text "$(cat <brief.md>)"`), and your own Claude
    Opus or Sonnet subagents for critical pieces or fallback when an
    external executor stalls twice or hits limits. Run external
    workers in the background with output to per-subtask log files and
    monitor by evidence in a blocking loop (sleep then check log
    growth and commits), never by ending your reply. Warn every brief:
    workspace-wide builds fail in fresh worktrees because web/dist is
    absent (rust-embed); scope gates to the touched crates, do not
    investigate rustls or WebAssets errors.

    MERGES: one at a time into feat/<slug>; after every merge validate
    the diff yourself (Opus) before the next; conflicts are yours,
    never the lower tiers'. Subtask gates before each merge: fmt
    check, clippy on the touched crates with -D warnings, the touched
    crate test suites. After everything is merged run the full gate
    set on the feature branch: cargo fmt --all -- --check; cargo
    clippy --workspace --all-targets -- -D warnings; cargo test
    --workspace; cargo metadata --format-version 1 >/dev/null and
    code-ranker check . (fix violations, re-run until clean).

    Commit rules: atomic conventional commits, --signoff, body ending
    with the Co-Authored-By trailer of the ACTING model. Never push,
    never open a PR. Leave worktrees and wt/ branches in place for the
    hygiene node.

    End with: the remainder subtask list with the executor that did
    each, the merge order, each final gate with its real result, and
    any deviations with rationale.
  profile:
    name: developer
    scope: auto
  max_retries: null
  timeout_seconds: null
  workdir: null
  isolation: null
  success_check: null
  connectors: []
  interactive: false
