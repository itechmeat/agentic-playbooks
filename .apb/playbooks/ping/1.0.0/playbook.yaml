schema: 1
id: ping
name: Ping Haiku
description: Minimal playbook - ping claude code (haiku)
version: 1.0.0

executors:
  main:
    agent: claude-code
    model: haiku

defaults:
  executor: main

nodes:
  - id: start
    type: start
    title: Start
  - id: ping
    type: agent_task
    title: Ping
    prompt: |
      Reply with exactly one word: pong
  - id: done
    type: finish
    outcome: success

edges:
  - { from: start, to: ping }
  - { from: ping, to: done }
