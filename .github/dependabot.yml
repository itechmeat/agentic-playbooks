version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    # Major bumps stay ungrouped on purpose: each is its own PR for review.

  - package-ecosystem: bun
    directory: /web
    schedule:
      interval: weekly
    groups:
      web-patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    # Major bumps stay ungrouped on purpose: each is its own PR for review.
    ignore:
      # svelte-check (all versions, latest 4.7.2) crashes on TS 7 with
      # TypeError on typescript.sys.useCaseSensitiveFileNames. Re-enable
      # when svelte-check ships TS 7 support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
