version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    # Major bumps stay ungrouped on purpose: each is its own PR for review.

  - package-ecosystem: bun
    directory: /web
    schedule:
      interval: weekly
    groups:
      web-patch-and-minor:
        update-types:
          - "patch"
          - "minor"
