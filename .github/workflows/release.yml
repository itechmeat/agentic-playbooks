name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Build web (needed by rust-embed)
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      # web/dist is gitignored: build the frontend BEFORE cargo, since apb-server
      # embeds it via rust-embed (folder = ../../web/dist).
      - name: Build web
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p apb-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir stage
          cp "target/${{ matrix.target }}/release/apb" stage/
          cp LICENSE stage/
          tar -czf "apb-${{ matrix.target }}.tar.gz" -C stage .
          shasum -a 256 "apb-${{ matrix.target }}.tar.gz" > "apb-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apb-${{ matrix.target }}.tar.gz
            apb-${{ matrix.target }}.tar.gz.sha256
