name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The release body comes from a notes file reviewed in the release PR;
      # failing early here is deliberate - no silent fallback to an empty or
      # auto-generated body.
      - name: Require release notes for this tag
        run: |
          notes="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes" ]; then
            echo "::error::missing $notes - prepare release notes in the release PR before tagging"
            exit 1
          fi

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Build web (needed by rust-embed)
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install musl tools (static Linux build)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # web/dist is gitignored: build the frontend BEFORE cargo, since apb-server
      # embeds it via rust-embed (folder = ../../web/dist).
      - name: Build web
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p apb-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir stage
          cp "target/${{ matrix.target }}/release/apb" stage/
          cp LICENSE stage/
          tar -czf "apb-${{ matrix.target }}.tar.gz" -C stage .
          shasum -a 256 "apb-${{ matrix.target }}.tar.gz" > "apb-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/release-notes/${{ github.ref_name }}.md
          files: |
            apb-${{ matrix.target }}.tar.gz
            apb-${{ matrix.target }}.tar.gz.sha256
