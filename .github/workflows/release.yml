name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      # web/dist is gitignored: build the frontend BEFORE cargo, since apb-server
      # embeds it via rust-embed (folder = ../../web/dist).
      - name: Build web
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p apb-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          bin="target/${{ matrix.target }}/release/apb"
          tar -czf "apb-${{ matrix.target }}.tar.gz" -C "$(dirname "$bin")" apb

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: apb-${{ matrix.target }}.tar.gz
